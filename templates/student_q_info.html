<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Query Information</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .card {
            margin-top: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .card-header {
            background-color: #007bff;
            color: #fff;
        }
        .card-body {
            padding: 20px;
        }
        .query-text {
            font-style: italic;
            color: #495057;
        }
        .reply-text {
            color: #28a745;
            font-weight: bold;
        }
        .alert {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center">Student Query Information</h1>
        
        {% if reply_data %}
            <div class="card">
                <div class="card-header">
                    <h4>Query Details</h4>
                </div>
                <div class="card-body">
                    <p><strong>ID:</strong> {{ reply_data.id }}</p>
                    <p><strong>Name:</strong> {{ reply_data.name }}</p>
                    <p><strong>Course:</strong> {{ reply_data.course }}</p>
                    <p><strong>Query:</strong></p>
                    <p class="query-text">{{ reply_data.query }}</p>
                    <p><strong>Reply:</strong></p>
                    <p class="reply-text">{{ reply_data.query_reply }}</p>
                </div>
            </div>
        {% else %}
            <div class="alert alert-warning" role="alert">
                No reply data found for this student.
            </div>
        {% endif %}
    </div>
</body>
</html>
