<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Email</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: #fff;
            font-family: Arial, sans-serif;
        }
        .card {
            border-radius: 15px;
        }
        .btn-primary {
            background-color: #2575fc;
            border-color: #2575fc;
        }
        .btn-primary:hover {
            background-color: #6a11cb;
            border-color: #6a11cb;
        }
        .form-label {
            color: #fff;
        }
    </style>
</head>
<body>
    <section class="vh-100 d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-6">
                    <div class="card bg-dark text-white">
                        <div class="card-body p-4">
                            <h3 class="text-center mb-4">Send Email</h3>
                            <form method="POST" action="/send_email/">
                                {% csrf_token %}
                                <!-- Email Input -->
                                <div class="mb-3">
                                    <label for="recipient_email" class="form-label">Recipient Email</label>
                                    <input type="email" class="form-control" id="recipient_email" name="recipient_email" placeholder="Enter recipient email" required>
                                </div>
                                <!-- Subject Input -->
                                <div class="mb-3">
                                    <label for="subject" class="form-label">Subject</label>
                                    <input type="text" class="form-control" id="subject" name="subject" placeholder="Enter subject" required>
                                </div>
                                <!-- Message Input -->
                                <div class="mb-3">
                                    <label for="message" class="form-label">Message</label>
                                    <textarea class="form-control" id="message" name="message" rows="4" placeholder="Enter your message" required></textarea>
                                </div>
                                <!-- Send Button -->
                                <div class="d-grid">
                                    <button type="submit" class="btn btn-primary btn-lg">Send Email</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
