<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Success Message</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- Success Alert -->
    <div id="success-alert" class="alert alert-success alert-dismissible fade show d-none" role="alert">
        <strong>Success!</strong> The operation was completed successfully.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Button -->
    <div class="container text-center mt-5">
        <button id="show-alert-btn" class="btn btn-primary">Click Me</button>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript -->
    <script>
        document.getElementById('show-alert-btn').addEventListener('click', function () {
            const alert = document.getElementById('success-alert');
            alert.classList.remove('d-none'); // Show the alert
        });
    </script>
</body>
</html>
