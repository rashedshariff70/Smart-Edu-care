<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Design by foolishdeveloper.com -->
        <title>Glassmorphism login Form Tutorial in html css</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="preconnect" href="https://fonts.gstatic.com">
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap"
            rel="stylesheet">
        <!--Stylesheet-->
        <style media="screen">
      *,
*:before,
*:after{
    padding: 0;
    margin: 0;
    box-sizing: border-box;
}
body{
    background-color: #2a292b;
}
.background{
    width: 430px;
    height: 620px;
    position: absolute;
    transform: translate(-50%,-50%);
    left: 50%;
    top: 50%;
}
.background .shape{
    height: 200px;
    width: 200px;
    position: absolute;
    border-radius: 50%;
}
.shape:first-child{
    background: linear-gradient(
        #1845ad,
        #23a2f6
    );
    left: -80px;
    top: -80px;
}
.shape:last-child{
    background: linear-gradient(
        to right,
        #ff512f,
        #f09819
    );
    right: -30px;
    bottom: -80px;
}
form{
    height: 730px;
    width: 400px;
    background-color: rgba(255,255,255,0.13);
    position: absolute;
    transform: translate(-50%,-50%);
    top: 50%;
    left: 50%;
    border-radius: 10px;
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,0.1);
    box-shadow: 0 0 40px rgba(8,7,16,0.6);
    padding: 50px 35px;
}
form *{
    font-family: 'Poppins',sans-serif;
    color: #ffffff;
    letter-spacing: 0.5px;
    outline: none;
    border: none;
}
form h3{
    font-size: 32px;
    font-weight: 500;
    line-height: 42px;
    text-align: center;
}

label{
    display: block;
    margin-top: 30px;
    font-size: 16px;
    font-weight: 500;
}
input{
    display: block;
    height: 50px;
    width: 330px;
    background-color: rgba(255,255,255,0.07);
    border-radius: 3px;
    padding: 0 10px;
    margin-top: 8px;
    font-size: 14px;
    font-weight: 300;
}
::placeholder{
    color: #e5e5e5;
}
button{
    margin-top: 50px;
    width: 100%;
    background-color: #ffffff;
    color: #080710;
    padding: 15px 0;
    font-size: 18px;
    font-weight: 600;
    border-radius: 5px;
    cursor: pointer;
}
.social{
  margin-top: 30px;
  display: flex;
}
.social div{
  background: red;
  width: 150px;
  border-radius: 3px;
  padding: 5px 10px 10px 5px;
  background-color: rgba(255,255,255,0.27);
  color: #eaf0fb;
  text-align: center;
}
.social div:hover{
  background-color: rgba(255,255,255,0.47);
}
.social .fb{
  margin-left: 25px;
}
.social i{
  margin-right: 4px;
}

    </style>
    </head>
    <body>
       <!-- Success Alert -->
    <div id="success-alert" class="alert alert-success alert-dismissible fade show d-none" role="alert">
        <strong>Success!</strong> The operation was completed successfully.
       
    </div>
        <div class="background">
            <div class="shape"></div>
            <div class="shape"></div>
        </div>

        <div class="form-container">
               
            <form action="{% url 'Course' %}" method="POST">
                {% csrf_token %}

                <h4>Student Information</h4>
                <label for="id">ID:</label>
                <input type="text" id="id" name="id" required>

                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <div class="mb-3">
                    <label for="exampleSelect" class="form-label">Select an option</label>
                    <select class="form-select" id="exampleSelect" name="course">
                        <option selected style="color: black;">Open this select menu</option>
                        <option value="BA" style="color: black;">BA</option>
                        <option value="MCA" style="color: black;">MCA</option>
                        <option value="BD" style="color: black;">BD</option>
                        <option value="BSC" style="color: black;">BSC</option>
                        <option value="BSA" style="color: black;">BSA</option>
                        <option value="6" style="color: black;">Option 2</option>
                        <option value="7" style="color: black;">Option 3</option>
                        <option value="8" style="color: black;">Option 4</option>
                    </select>
                </div>

                <label for="attendance">Attendance:</label>
                <input type="number" id="attendance" name="attendance" min="0"
                    max="100" required>

                <label for="college">College:</label>
                <input type="text" id="college" name="college" required>

                <div class="container text-center mt-5" style="margin: 0px;">
                    <button id="show-alert-btn" class="btn btn-primary" style="margin: 0px; height: 50px; ">Click Me</button>
                </div>
            </form>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>

        <script>
            document.getElementById('show-alert-btn').addEventListener('click', function () {
            const alert = document.getElementById('success-alert');
            alert.classList.remove('d-none'); // Show the alert

            setTimeout(function () {
                alert.classList.add('d-none');
            }, 5000); // 5000 milliseconds = 5 seconds1
            });
            // Wait for the DOM to be fully loaded before running the script
            document.addEventListener('DOMContentLoaded', function() {
                // Get the form and its input fields
                const form = document.querySelector('form');
                const idField = document.getElementById('id');
                const nameField = document.getElementById('name');
                const attendanceField = document.getElementById('attendance');
                const collegeField = document.getElementById('college');
            
                // Function to validate form inputs
                form.addEventListener('submit', function(event) {
                    let isValid = true;
            
                    // Clear previous error messages
                    clearErrorMessages();
            
                    // Validate ID: check if it is empty
                    if (!idField.value.trim()) {
                        isValid = false;
                        showError(idField, "ID is required.");
                    }
                    if (!/^\d+$/.test(idField.value.trim())) {
                        isValid = false;
                        showError(idField, "ID must contain only numbers.");
                    }
            
                    // Validate Name: check if it is empty
                    if (!nameField.value.trim()) {
                        isValid = false;
                        showError(nameField, "Name is required.");
                    }
                    else if (!/^[A-Za-z\s]+$/.test(nameField.value.trim())) {
                        isValid = false;
                        showError(collegeField, "Name must contain only letters and spaces.");
                    }
                    
            
                    // Validate Attendance: check if it's within the valid range
                    if (attendanceField.value < 0 || attendanceField.value > 100) {
                        isValid = false;
                        showError(attendanceField, "Attendance should be between 0 and 100.");
                    }
            
                    // Validate College: check if it is empty
                    if (!collegeField.value.trim()) {
                        isValid = false;
                        showError(collegeField, "College is required.");
                    }
                    if (!/^[A-Za-z\s]+$/.test(collegeField.value.trim())) {
                        isValid = false;
                        showError(collegeField, "College must contain only letters and spaces.");
                    }
                    // If any validation fails, prevent form submission
                    if (!isValid) {
                        event.preventDefault();
                    }
                });
            
                // Function to display error messages
                function showError(inputField, message) {
                    const errorMessage = document.createElement('div');
                    errorMessage.classList.add('error-message');
                    errorMessage.innerHTML = message;
                    inputField.parentElement.appendChild(errorMessage);
                }
            
                // Function to clear previous error messages
                function clearErrorMessages() {
                    const errorMessages = document.querySelectorAll('.error-message');
                    errorMessages.forEach(message => message.remove());
                }
            });
            </script>

        <style>
                .error-message {
                    color: red;
                    font-size: 12px;
                    margin-top: 5px;
                }
            </style>
      
    </body>
</html>
