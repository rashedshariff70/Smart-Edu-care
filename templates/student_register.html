<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration | SmartEduCare</title>

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(180deg, #F8FAFC 0%, #E6F0FA 100%);
            min-height: 100vh;
        }

        /* ===== NAVBAR (Same as Home Page) ===== */
        .navbar-custom {
            background: linear-gradient(180deg, #2C3E50 0%, #1A2634 100%);
            padding: 15px 40px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .navbar-custom h1 {
            color: #ECF0F1;
            font-weight: 700;
            font-size: 26px;
            margin: 0;
        }

        .navbar-custom ul {
            list-style: none;
            display: flex;
            align-items: center;
            margin: 0;
        }

        .navbar-custom ul li {
            margin-left: 20px;
            position: relative;
        }

        .navbar-custom ul li a {
            color: #ECF0F1;
            text-decoration: none;
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 6px;
        }

        .navbar-custom ul li a:hover {
            background: rgba(255,255,255,0.1);
            color: #2ECC71;
        }

        .dropdown-menu-custom {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background: #1A2634;
            min-width: 160px;
            border-radius: 6px;
        }

        .dropdown:hover .dropdown-menu-custom {
            display: block;
        }

        .dropdown-menu-custom a {
            display: block;
            padding: 10px 15px;
            color: #ECF0F1;
        }

        .dropdown-menu-custom a:hover {
            background: #27AE60;
        }

        /* ===== CARD ===== */
        .card {
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: none;
        }

        .card-header {
            background: linear-gradient(135deg, #0d6efd, #0b5ed7);
            color: white;
        }
    </style>
</head>
<body>

<!-- ===== NAVBAR ===== -->
<nav class="navbar navbar-custom">
    <h1>SmartEduCare</h1>
    <ul>
        <li><a href="/">Home</a></li>
        <li class="dropdown">
            <a href="#">Student <i class="fas fa-caret-down"></i></a>
            <div class="dropdown-menu-custom">
                <a href="{% url 'student_register' %}">Register</a>
                <a href="{% url 'student_login' %}">Login</a>
            </div>
        </li>
        <li class="dropdown">
            <a href="#">University <i class="fas fa-caret-down"></i></a>
            <div class="dropdown-menu-custom">
                <a href="/university">Register</a>
                <a href="/university/login">Login</a>
            </div>
        </li>
    </ul>
</nav>

<!-- ===== FORM ===== -->
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header text-center p-4">
                    <h3>Student Registration</h3>
                    <p class="opacity-75 mb-0">Create your SmartEduCare account</p>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="fw-bold">College Name</label>
                            <input type="text" name="college_name" class="form-control form-control-lg" required>
                        </div>

                        <div class="mb-3">
                            <label class="fw-bold">College Email</label>
                            <input type="email" name="college_email" class="form-control form-control-lg" required>
                        </div>

                        <div class="mb-3">
                            <label class="fw-bold">College ID</label>
                            <input type="text" name="college_id" class="form-control form-control-lg" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="fw-bold">Password</label>
                                <input type="password" name="password" class="form-control form-control-lg" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="fw-bold">Confirm Password</label>
                                <input type="password" name="password_confirm" class="form-control form-control-lg" required>
                            </div>
                        </div>

                        <button class="btn btn-primary btn-lg w-100 mt-3">REGISTER</button>
                    </form>

                    <p class="text-center mt-4">
                        Already have an account?
                        <a href="{% url 'student_login' %}" class="fw-bold text-primary">Login here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
