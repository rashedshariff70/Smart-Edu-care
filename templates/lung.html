<!DOCTYPE html>
<html lang="en">
<head>
    <title>Lung Cancer Detection</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container mt-5 mb-5">
    <div class="card bg-light text-dark shadow-lg border-0 p-4">

        <h2 class="text-center text-danger mb-2">
            🫁 Lung Cancer Detection
        </h2>

        <p class="text-center">
            Upload a chest CT scan to detect
            <strong>Benign</strong>, <strong>Adenocarcinoma</strong>,
            or <strong>Squamous Cell Carcinoma</strong>.
        </p>

        <!-- Upload Form -->
        <form method="POST" enctype="multipart/form-data" class="mt-4">
            {% csrf_token %}

            <div class="mb-3">
                <input
                    type="file"
                    name="image"
                    class="form-control"
                    accept="image/*"
                    required
                >
            </div>

            <button type="submit" class="btn btn-danger w-100">
                Analyze Scan
            </button>
        </form>

        <!-- Result Section -->
        {% if uploaded_image %}
        <hr>

        <div class="text-center mt-4">
            <h5 class="mb-3">Uploaded CT Scan</h5>

            <img
                src="{{ uploaded_image }}"
                class="img-fluid rounded shadow mb-3"
                style="max-height: 300px;"
                alt="Uploaded Lung Scan"
            >

            {% if prediction %}
            <div class="alert alert-warning mt-3">
                <h4 class="mb-0">
                    Prediction Result:
                    <strong>{{ prediction }}</strong>
                </h4>
            </div>
            {% endif %}
        </div>
        {% endif %}

    </div>
</div>

</body>
</html>
