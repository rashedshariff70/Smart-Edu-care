<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Upload CSV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f6f9;
        }

        .sidebar {
            width: 250px;
            height: 100vh;
            background-color: #2c3e50;
            color: white;
            position: fixed;
            left: 0;
            top: 0;
            padding-top: 30px;
            text-align: center;
        }

        .sidebar img {
            width: 100px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .sidebar h4 {
            margin-top: 10px;
        }

        .main-content {
            margin-left: 250px;
            padding: 30px;
        }

        .custom-file-upload {
            margin-bottom: 20px;
        }

        table {
            margin-top: 20px;
        }

        .table-responsive {
            max-height: 500px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <img src="https://i.pravatar.cc/100" alt="Profile Picture">
    <h4>Admin Name</h4>
    <p>CSV Manager</p>
</div>

<div class="main-content">
    <h2>Upload CSV File</h2>
    
    <form id="csvForm">
        <div class="mb-3">
            <input type="file" class="form-control" id="csvFile" accept=".csv" required>
        </div>
        <button type="submit" class="btn btn-primary">Upload & Display</button>
    </form>

    <div class="table-responsive">
        <table class="table table-bordered table-hover mt-4" id="csvTable">
            <thead class="table-dark" id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<!-- JS Scripts -->
<script>
    document.getElementById('csvForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const fileInput = document.getElementById('csvFile');
        const file = fileInput.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const lines = e.target.result.split('\n').filter(line => line.trim() !== '');
            const headers = lines[0].split(',');

            const tableHead = document.getElementById('tableHead');
            const tableBody = document.getElementById('tableBody');

            tableHead.innerHTML = '';
            tableBody.innerHTML = '';

            let headerRow = '<tr>';
            headers.forEach(header => {
                headerRow += `<th>${header.trim()}</th>`;
            });
            headerRow += '</tr>';
            tableHead.innerHTML = headerRow;

            for (let i = 1; i < lines.length; i++) {
                const cells = lines[i].split(',');
                let row = '<tr>';
                cells.forEach(cell => {
                    row += `<td>${cell.trim()}</td>`;
                });
                row += '</tr>';
                tableBody.innerHTML += row;
            }
        };
        reader.readAsText(file);
    });
</script>

</body>
</html>
