<!DOCTYPE html>
<html lang="en">
<head>
    <title>Breast Cancer Detection</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5 mb-5">
    <div class="card shadow-lg border-0 p-4">

        <h2 class="text-center text-primary mb-2">
            🩺 Breast Cancer Detection
        </h2>

        <p class="text-center text-muted">
            Upload an ultrasound image to identify whether the tumor is
            <strong>Benign</strong>, <strong>Malignant</strong>, or <strong>Normal</strong>.
        </p>

        <!-- Upload Form -->
        <form method="POST" enctype="multipart/form-data" class="mt-4">
            {% csrf_token %}

            <div class="mb-3">
                <input
                    type="file"
                    name="image"
                    class="form-control"
                    accept="image/*"
                    required
                >
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Analyze Image
            </button>
        </form>

        <!-- Result Section -->
        {% if uploaded_image %}
        <hr>

        <div class="text-center mt-4">
            <h5 class="mb-3">Uploaded Image</h5>

            <img
                src="{{ uploaded_image }}"
                class="img-fluid rounded shadow mb-3"
                style="max-height: 300px;"
                alt="Uploaded Breast Image"
            >

            {% if prediction %}
            <div class="alert alert-success mt-3">
                <h4 class="mb-0">
                    Prediction Result:
                    <strong>{{ prediction }}</strong>
                </h4>
            </div>
            {% endif %}
        </div>
        {% endif %}

    </div>
</div>

</body>
</html>
